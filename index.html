<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>HebLib Pro 2.2</title>
    <style>
        :root { --primary: #0038A8; --accent: #ffcc00; --bg: #f4f7f9; --white: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; direction: rtl; }
        .nav-back { text-align: center; margin-bottom: 10px; }
        .nav-back a { text-decoration: none; color: var(--primary); font-size: 14px; font-weight: bold; }
        .add-section { background: var(--white); border-radius: 16px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1.5px solid #eee; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn-magic { background: var(--accent); border: none; padding: 10px 15px; border-radius: 12px; cursor: pointer; font-size: 20px; }
        .helper-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .btn-helper { flex: 1; background: #e0e7ff; color: var(--primary); border: none; padding: 10px; border-radius: 10px; font-size: 12px; cursor: pointer; font-weight: bold; text-align: center; text-decoration: none; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 18px; font-weight: bold; margin-top: 10px; }
        .word-card { background: white; padding: 15px; border-radius: 12px; margin-top: 10px; border-right: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; text-align: right; }
        .btn-del { position: absolute; left: 10px; top: 10px; background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; padding: 5px; }
        .tag { display: inline-block; background: #eef2ff; color: var(--primary); padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="nav-back">
    <a href="https://jriverbend.github.io/FunHebrew/">← В новости</a>
</div>

<div class="add-section">
    <div class="input-group">
        <input type="text" id="hebrew" placeholder="Слово на иврите...">
        <button class="btn-magic" id="magicBtn" onclick="superMagic()">✨</button>
    </div>

    <div class="helper-row">
        <button class="btn-helper" onclick="openContext()">📖 Транскрипция</button>
        <button class="btn-helper" onclick="openPealim()">📊 Грамматика</button>
    </div>

    <input type="text" id="translation" placeholder="Перевод">
    <input type="text" id="transcription" placeholder="Транскрипция">
    
    <div style="display: flex; gap: 10px;">
        <select id="gender">
            <option value="м.р.">Муж. род</option>
            <option value="ж.р.">Жен. род</option>
        </select>
        <input type="text" id="plural" placeholder="Мн. число">
    </div>

    <button class="btn-save" onclick="addWord()">Сохранить слово</button>
</div>

<div id="dict-list"></div>

<script>
    // Reverso Context — самый надежный вариант
    function openContext() {
        const w = document.getElementById('hebrew').value.trim();
        if(w) {
            window.open(`https://context.reverso.net/translation/hebrew-russian/${encodeURIComponent(w)}`, '_blank');
        } else { alert("Введи слово!"); }
    }

    function openPealim() {
        const w = document.getElementById('hebrew').value.trim();
        if(w) window.open(`https://www.pealim.com/search/?q=${encodeURIComponent(w)}`, '_blank');
    }

    async function superMagic() {
        const word = document.getElementById('hebrew').value.trim();
        if (!word) return;
        const btn = document.getElementById('magicBtn');
        btn.innerText = "⏳";
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=he|ru`);
            const data = await res.json();
            document.getElementById('translation').value = data.responseData.translatedText;
            document.getElementById('gender').value = (word.endsWith('ה') || word.endsWith('ת')) ? "ж.р." : "м.р.";
        } catch (e) { alert("Ошибка связи"); } 
        finally { btn.innerText = "✨"; }
    }

    let dictionary = JSON.parse(localStorage.getItem('hebrewLibData') || '[]');

    function addWord() {
        const h = document.getElementById('hebrew').value.trim();
        const t = document.getElementById('translation').value.trim();
        if (!h || !t) return;
        
        dictionary.push({
            id: Date.now(),
            he: h, tr: t, 
            ts: document.getElementById('transcription').value,
            g: document.getElementById('gender').value,
            p: document.getElementById('plural').value
        });
        localStorage.setItem('hebrewLibData', JSON.stringify(dictionary));
        render();
        ["hebrew", "translation", "transcription", "plural"].forEach(id => document.getElementById(id).value = '');
    }

    function deleteWord(id) {
        if(confirm("Удалить это слово?")) {
            dictionary = dictionary.filter(w => w.id !== id);
            localStorage.setItem('hebrewLibData', JSON.stringify(dictionary));
            render();
        }
    }

    function render() {
        const list = document.getElementById('dict-list');
        list.innerHTML = '';
        dictionary.slice().reverse().forEach(w => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.innerHTML = `
                <button class="btn-del" onclick="deleteWord(${w.id})">✕</button>
                <div style="font-size:22px; font-weight:bold; color:var(--primary);">${w.he}</div>
                <div style="font-size:18px;">${w.tr} <span style="color:gray; font-size:14px;">[${w.ts}]</span></div>
                <div style="margin-top:8px;">
                    <span class="tag">${w.g}</span>
                    ${w.p ? `<span class="tag">Мн: ${w.p}</span>` : ''}
                </div>
            `;
            list.appendChild(card);
        });
    }
    render();
</script>
</body>
</html>
