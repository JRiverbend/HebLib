<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#0038A8">

    <title>HebLib — Академический Словарь</title>

    <style>
        :root { --primary: #0038A8; --accent: #ffcc00; --bg: #f4f7f9; --white: #ffffff; --text: #1c1c1e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; direction: rtl; color: var(--text); }
        .nav-back { text-align: center; margin-bottom: 10px; }
        .nav-back a { text-decoration: none; color: var(--primary); font-size: 14px; font-weight: bold; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 28px; }
        .add-section { background: var(--white); border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; }
        
        /* Стили для поля ввода с кнопкой перевода */
        .input-group { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
        .input-main { flex-grow: 1; padding: 12px; border: 1.5px solid #eee; border-radius: 12px; font-size: 18px; outline: none; }
        .btn-lookup { background: var(--accent); border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 18px; }
        
        select, input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        .row { display: flex; gap: 10px; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .word-card { background: white; padding: 18px; border-radius: 15px; margin-bottom: 12px; border-right: 6px solid var(--primary); position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.04); text-align: right; }
        .word-he { font-size: 24px; font-weight: 800; color: var(--primary); }
        .btn-speak { background: none; border: none; font-size: 22px; cursor: pointer; }
        .btn-del { position: absolute; left: 15px; top: 15px; color: #ccc; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

<div class="nav-back">
    <a href="https://jriverbend.github.io/FunHebrew/">← Вернуться к новостям FunHebrew</a>
</div>

<div class="header">
    <h1>HebLib</h1>
</div>

<div class="add-section">
    <select id="type" onchange="toggleFields()">
        <option value="noun">Существительное (שם עצм)</option>
        <option value="verb">Глагол (פועל)</option>
        <option value="adj">Прилагательное (שם תואר)</option>
        <option value="other">Другое</option>
    </select>
    
    <div class="input-group">
        <input type="text" id="hebrew" class="input-main" placeholder="Слово на иврите">
        <button class="btn-lookup" onclick="lookupWord()" title="Найти перевод">🔍</button>
    </div>

    <input type="text" id="translation" placeholder="Перевод (нажми на лупу выше)">
    <input type="text" id="transcription" placeholder="Транскрипция">
    
    <div id="noun-fields" class="row">
        <select id="gender"><option value="м.р.">Муж. род</option><option value="ж.р.">Жен. род</option></select>
        <input type="text" id="plural" placeholder="Мн. число">
    </div>

    <div id="verb-fields" style="display:none;">
        <input type="text" id="root" placeholder="Корень (Шореш)">
    </div>

    <button class="btn-save" onclick="addWord()">Сохранить в базу</button>
</div>

<div id="dict-list"></div>

<script>
    let dictionary = JSON.parse(localStorage.getItem('hebrewLibData') || '[]');

    function lookupWord() {
        const word = document.getElementById('hebrew').value.trim();
        if (!word) return alert("Сначала введи слово!");
        // Открываем Reverso Context — лучший словарь для иврита
        window.open(`https://context.reverso.net/translation/hebrew-russian/${word}`, '_blank');
    }

    function toggleFields() {
        const type = document.getElementById('type').value;
        document.getElementById('noun-fields').style.display = (type === 'noun' || type === 'adj') ? 'flex' : 'none';
        document.getElementById('verb-fields').style.display = (type === 'verb') ? 'block' : 'none';
    }

    function addWord() {
        const he = document.getElementById('hebrew').value.trim();
        const tr = document.getElementById('translation').value.trim();
        if (!he || !tr) return alert("Иврит и перевод обязательны!");

        const word = {
            id: Date.now(),
            type: document.getElementById('type').value,
            he: he,
            transcription: document.getElementById('transcription').value,
            translation: tr,
            gender: document.getElementById('gender').value,
            plural: document.getElementById('plural').value,
            root: document.getElementById('root').value
        };

        dictionary.push(word);
        localStorage.setItem('hebrewLibData', JSON.stringify(dictionary));
        render();
        document.getElementById('hebrew').value = '';
        document.getElementById('translation').value = '';
        document.getElementById('hebrew').focus();
    }

    function deleteWord(id) {
        if(confirm("Удалить?")) {
            dictionary = dictionary.filter(w => w.id !== id);
            localStorage.setItem('hebrewLibData', JSON.stringify(dictionary));
            render();
        }
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'he-IL';
        window.speechSynthesis.speak(utterance);
    }

    function render() {
        const list = document.getElementById('dict-list');
        list.innerHTML = '';
        dictionary.slice().reverse().forEach(w => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.innerHTML = `
                <button class="btn-del" onclick="deleteWord(${w.id})">✕</button>
                <div style="display:flex; justify-content:space-between;">
                    <div class="word-he">${w.he}</div>
                    <button class="btn-speak" onclick="speak('${w.he}')">🔊</button>
                </div>
                <div style="font-weight:bold;">${w.translation}</div>
                <div style="color:#666; font-size:13px;">[${w.transcription}]</div>
            `;
            list.appendChild(card);
        });
    }
    render();
</script>
</body>
</html>
