<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <link rel="apple-touch-icon" href="icon.png">
    <title>HebLib Smart</title>
    <style>
        :root { --primary: #0038A8; --accent: #ffcc00; --bg: #f4f7f9; --white: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; direction: rtl; }
        .nav-back { text-align: center; margin-bottom: 10px; }
        .nav-back a { text-decoration: none; color: var(--primary); font-size: 14px; font-weight: bold; }
        .add-section { background: var(--white); border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1.5px solid #eee; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .btn-magic { background: var(--accent); border: none; padding: 10px 15px; border-radius: 12px; cursor: pointer; font-size: 20px; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .word-card { background: white; padding: 15px; border-radius: 12px; margin-top: 10px; border-right: 5px solid var(--primary); position: relative; }
        .tag { display: inline-block; background: #eee; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="nav-back">
    <a href="https://jriverbend.github.io/FunHebrew/">← В новости</a>
</div>

<div class="add-section">
    <div class="input-group">
        <input type="text" id="hebrew" placeholder="Слово на иврите (напр. עבודה)">
        <button class="btn-magic" onclick="magicTranslate()" title="Автозаполнение">✨</button>
    </div>

    <input type="text" id="translation" placeholder="Перевод появится здесь">
    <input type="text" id="transcription" placeholder="Транскрипция">
    
    <div id="noun-fields" style="display: flex; gap: 10px;">
        <select id="gender">
            <option value="м.р.">Муж. род</option>
            <option value="ж.р.">Жен. род</option>
        </select>
        <input type="text" id="plural" placeholder="Мн. число">
    </div>

    <button class="btn-save" onclick="addWord()">Сохранить в Мою Базу</button>
</div>

<div id="dict-list"></div>

<script>
    // Наша стартовая "умная" база знаний
    const smartDB = {
        "עבודה": { tr: "Работа", ts: "Авода", g: "ж.р.", p: "עבודות" },
        "בית": { tr: "Дом", ts: "Байт", g: "м.р.", p: "בתים" },
        "ספר": { tr: "Книга", ts: "Сефер", g: "м.р.", p: "ספרים" },
        "חדשות": { tr: "Новости", ts: "Хадашот", g: "ж.р.", p: "-" }
    };

    function magicTranslate() {
        const word = document.getElementById('hebrew').value.trim();
        const data = smartDB[word];

        if (data) {
            document.getElementById('translation').value = data.tr;
            document.getElementById('transcription').value = data.ts;
            document.getElementById('gender').value = data.g;
            document.getElementById('plural').value = data.p;
        } else {
            alert("Этого слова пока нет в авто-базе. Введи вручную один раз, и я его запомню!");
        }
    }

    let dictionary = JSON.parse(localStorage.getItem('hebrewLibData') || '[]');

    function addWord() {
        const he = document.getElementById('hebrew').value.trim();
        const tr = document.getElementById('translation').value.trim();
        if (!he || !tr) return;

        const word = {
            id: Date.now(),
            he: he,
            tr: tr,
            ts: document.getElementById('transcription').value,
            g: document.getElementById('gender').value,
            p: document.getElementById('plural').value
        };

        dictionary.push(word);
        localStorage.setItem('hebrewLibData', JSON.stringify(dictionary));
        render();
        // Очистка
        ["hebrew", "translation", "transcription", "plural"].forEach(id => document.getElementById(id).value = '');
    }

    function render() {
        const list = document.getElementById('dict-list');
        list.innerHTML = '';
        dictionary.slice().reverse().forEach(w => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.innerHTML = `
                <div style="font-size:20px; font-weight:bold; color:var(--primary);">${w.he}</div>
                <div>${w.tr} <small style="color:gray;">[${w.ts}]</small></div>
                <div style="margin-top:5px;">
                    <span class="tag">${w.g}</span>
                    <span class="tag">Мн.ч: ${w.p}</span>
                </div>
            `;
            list.appendChild(card);
        });
    }
    render();
</script>
</body>
</html>
